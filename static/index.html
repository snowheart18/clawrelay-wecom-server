<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawRelay WeCom Server</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #1e293b;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .links a {
            color: #60a5fa;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }
        .links a:hover {
            background: #1e293b;
            border-color: #60a5fa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ClawRelay WeCom Server</h1>
        <p class="subtitle">Enterprise WeChat Intelligent Bot Server</p>
        <div class="status">
            <span class="dot"></span>
            <span>Server Running</span>
        </div>
        <div class="links">
            <a href="/health">Health Check</a>
            <a href="/test">Test Page</a>
            <a href="https://github.com/wxkingstar/clawrelay-wecom-server">GitHub</a>
        </div>
    </div>
</body>
</html>
