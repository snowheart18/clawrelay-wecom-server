<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeChat Bot Test Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card-title {
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
        }

        .card-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 24px;
            background: linear-gradient(135deg, #1e88e5 0%, #1565c0 100%);
            margin-right: 12px;
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }

        select, input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: #1e88e5;
            box-shadow: 0 0 0 3px rgba(30, 136, 229, 0.1);
        }

        textarea {
            resize: vertical;
            font-family: inherit;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1e88e5 0%, #1565c0 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(30, 136, 229, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .response-area {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            min-height: 300px;
            max-height: 600px;
            overflow-y: auto;
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .message {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 8px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-user {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
        }

        .message-bot {
            background: #f1f8e9;
            border-left: 4px solid #8bc34a;
        }

        .message-error {
            background: #ffebee;
            border-left: 4px solid #f44336;
        }

        .message-header {
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .message-time {
            font-size: 11px;
            opacity: 0.6;
        }

        .message-content {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1e88e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .bot-info {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #666;
        }

        .bot-info strong {
            color: #333;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 25px;
        }

        .quick-btn {
            padding: 10px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            font-size: 13px;
        }

        .quick-btn:hover {
            background: #e3f2fd;
            border-color: #1e88e5;
            color: #1565c0;
        }

        .log-panel {
            margin-top: 20px;
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .log-area {
            background: #1e1e1e;
            color: #d4d4d4;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 15px;
            height: 400px;
            overflow-y: auto;
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
            font-size: 12px;
            line-height: 1.5;
        }

        .log-line {
            margin-bottom: 4px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .log-line.info { color: #4ec9b0; }
        .log-line.warning { color: #dcdcaa; }
        .log-line.error { color: #f48771; }
        .log-line.debug { color: #9cdcfe; }

        .log-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .log-btn {
            padding: 8px 20px;
            background: linear-gradient(135deg, #1e88e5 0%, #1565c0 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            margin-left: 10px;
            min-width: 100px;
            width: auto;
        }

        .log-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(30, 136, 229, 0.4);
        }

        .log-btn:active {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>WeChat Bot Test Platform</h1>
            <p>Agent mode testing - Real-time chat - Multi-bot switching</p>
        </div>

        <div class="main-content">
            <!-- Left: Send message -->
            <div class="card">
                <div class="card-title">Send Message</div>

                <div class="form-group">
                    <label for="botSelect">Select Bot</label>
                    <select id="botSelect">
                        <option value="">Loading...</option>
                    </select>
                </div>

                <div id="botInfo" class="bot-info" style="display: none;">
                    <div><strong>Bot ID:</strong> <span id="botId"></span></div>
                    <div><strong>Callback Path:</strong> <span id="botPath"></span></div>
                    <div><strong>Description:</strong> <span id="botDesc"></span></div>
                </div>

                <div class="form-group">
                    <label for="userId">User ID</label>
                    <input type="text" id="userId" value="test_user_001" placeholder="Used to distinguish different user sessions">
                </div>

                <div class="form-group">
                    <label for="message">Message Content</label>
                    <textarea id="message" rows="6" placeholder="Enter your message...

Examples:
- Hello, who are you?
- What can you help me with?
- Tell me a joke"></textarea>
                </div>

                <div class="quick-actions" id="quickActions">
                    <!-- Quick messages generated by JavaScript -->
                </div>

                <button id="sendBtn" onclick="sendMessage()">Send Message</button>
            </div>

            <!-- Right: Chat history -->
            <div class="card">
                <div class="card-title">Chat History</div>
                <div id="responseArea" class="response-area">
                    <div style="text-align: center; color: #999; padding: 40px 0;">
                        No chat history yet<br>
                        <small>Select a bot and send a message to start testing</small>
                    </div>
                </div>
            </div>
        </div>

        <!-- Log panel -->
        <div class="log-panel">
            <div class="log-controls">
                <div class="card-title" style="margin: 0;">Real-time Logs</div>
                <div>
                    <button class="log-btn" onclick="clearLogs()">Clear Logs</button>
                    <button class="log-btn" onclick="toggleAutoScroll()" id="autoScrollBtn">Auto Scroll: ON</button>
                </div>
            </div>
            <div id="logArea" class="log-area">
                <div class="log-line info">Waiting for log output...</div>
            </div>
        </div>
    </div>

    <script>
        let bots = [];
        let autoScroll = true;
        let logPollingInterval = null;

        // Default quick messages for all bots
        const quickMessagesConfig = {
            'default': [
                { label: 'Greeting', message: 'Hello, who are you?' },
                { label: 'Help', message: 'What can you help me with?' },
                { label: 'Status', message: 'What is your current status?' },
                { label: 'Test', message: 'This is a test message' }
            ]
        };

        // Load bot list on page load
        window.onload = async function() {
            await loadBots();
            startLogPolling();
        };

        // Start log polling
        function startLogPolling() {
            fetchLogs();
            logPollingInterval = setInterval(fetchLogs, 2000);
        }

        // Fetch logs
        async function fetchLogs() {
            try {
                const response = await fetch('/api/logs');
                const data = await response.json();

                if (data.logs && data.logs.length > 0) {
                    updateLogs(data.logs);
                }
            } catch (error) {
                console.error('Failed to fetch logs:', error);
            }
        }

        // Update log display
        function updateLogs(logs) {
            const logArea = document.getElementById('logArea');

            if (logArea.children.length === 1 && logArea.children[0].textContent === 'Waiting for log output...') {
                logArea.innerHTML = '';
            }

            logs.forEach(log => {
                const logLine = document.createElement('div');
                logLine.className = `log-line ${log.level}`;
                logLine.textContent = `[${log.time}] [${log.level.toUpperCase()}] ${log.message}`;
                logArea.appendChild(logLine);
            });

            if (autoScroll) {
                logArea.scrollTop = logArea.scrollHeight;
            }
        }

        // Clear logs
        function clearLogs() {
            const logArea = document.getElementById('logArea');
            logArea.innerHTML = '<div class="log-line info">Logs cleared</div>';
        }

        // Toggle auto scroll
        function toggleAutoScroll() {
            autoScroll = !autoScroll;
            const btn = document.getElementById('autoScrollBtn');
            btn.textContent = `Auto Scroll: ${autoScroll ? 'ON' : 'OFF'}`;
        }

        // Load bot list
        async function loadBots() {
            try {
                const response = await fetch('/api/bots');
                const data = await response.json();
                bots = data.bots;

                const select = document.getElementById('botSelect');
                select.innerHTML = '<option value="">Select a bot</option>';

                bots.forEach(bot => {
                    const option = document.createElement('option');
                    option.value = bot.bot_key;
                    option.textContent = `${bot.description} (${bot.bot_key})`;
                    select.appendChild(option);
                });

                // Select first bot if available
                if (bots.length > 0) {
                    select.value = bots[0].bot_key;
                    updateBotInfo();
                }
            } catch (error) {
                console.error('Failed to load bot list:', error);
                addMessage('System', 'Failed to load bot list: ' + error.message, 'error');
            }
        }

        // Update bot info display
        function updateBotInfo() {
            const select = document.getElementById('botSelect');
            const botKey = select.value;

            if (!botKey) {
                document.getElementById('botInfo').style.display = 'none';
                document.getElementById('quickActions').innerHTML = '';
                return;
            }

            const bot = bots.find(b => b.bot_key === botKey);
            if (bot) {
                document.getElementById('botId').textContent = bot.bot_id;
                document.getElementById('botPath').textContent = bot.callback_path;
                document.getElementById('botDesc').textContent = bot.description;
                document.getElementById('botInfo').style.display = 'block';

                updateQuickMessages(botKey);
            }
        }

        // Update quick message buttons
        function updateQuickMessages(botKey) {
            const quickActionsDiv = document.getElementById('quickActions');
            const messages = quickMessagesConfig[botKey] || quickMessagesConfig['default'];

            quickActionsDiv.innerHTML = '';

            messages.forEach(item => {
                const btn = document.createElement('div');
                btn.className = 'quick-btn';
                btn.textContent = item.label;
                btn.onclick = () => setQuickMessage(item.message);
                quickActionsDiv.appendChild(btn);
            });
        }

        // Set quick message
        function setQuickMessage(msg) {
            document.getElementById('message').value = msg;
        }

        // Send message
        async function sendMessage() {
            const botKey = document.getElementById('botSelect').value;
            const userId = document.getElementById('userId').value;
            const message = document.getElementById('message').value;

            if (!botKey) {
                alert('Please select a bot');
                return;
            }

            if (!message.trim()) {
                alert('Please enter a message');
                return;
            }

            addMessage('User', message, 'user');

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="loading"></span> Sending...';

            try {
                const response = await fetch('/api/test/message', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        bot_key: botKey,
                        user_id: userId,
                        message: message
                    })
                });

                const data = await response.json();

                if (data.success) {
                    addMessage(
                        `${data.bot_name} (${data.took_time})`,
                        data.reply,
                        'bot'
                    );
                } else {
                    addMessage('Error', data.error || 'Send failed', 'error');
                }
            } catch (error) {
                console.error('Send failed:', error);
                addMessage('Error', 'Network error: ' + error.message, 'error');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send Message';
            }
        }

        // Add message to chat area
        function addMessage(sender, content, type = 'bot') {
            const responseArea = document.getElementById('responseArea');

            if (responseArea.children[0]?.style?.textAlign === 'center') {
                responseArea.innerHTML = '';
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message message-${type}`;

            const now = new Date();
            const timeStr = now.toLocaleTimeString();

            messageDiv.innerHTML = `
                <div class="message-header">
                    <span>${sender}</span>
                    <span class="message-time">${timeStr}</span>
                </div>
                <div class="message-content">${escapeHtml(content)}</div>
            `;

            responseArea.appendChild(messageDiv);
            responseArea.scrollTop = responseArea.scrollHeight;
        }

        // HTML escape
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Listen for bot selection change
        document.getElementById('botSelect').addEventListener('change', updateBotInfo);

        // Support Ctrl+Enter to send
        document.getElementById('message').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
